<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAT AUCTION ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background: #020617; color: #e2e8f0; padding: 20px; min-height: 100vh; }

        .header {
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 18px;
            border-radius: 16px;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
        }

        /* Phase control bar */
        .phase-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .phase-btn {
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            background: #1e293b;
        }

        .phase-btn.active-phase { border-color: #f8fafc; filter: brightness(1.3); }
        .phase-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .btn-cat  { background: #0f4c81; }
        .btn-q    { background: #065f46; }
        .btn-lb   { background: #6b21a8; }

        .top-status {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .status-card {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 14px;
            padding: 14px;
        }

        .status-card h3 { font-size: 11px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
        .status-card p  { font-size: 15px; font-weight: 700; color: #f8fafc; word-break: break-word; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .card {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 18px;
            padding: 20px;
        }

        .card h2 { margin-bottom: 16px; color: #e2e8f0; font-size: 18px; }
        .card h3 { color: #e2e8f0; margin-top: 18px; margin-bottom: 8px; font-size: 15px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.8);
            color: #e2e8f0;
        }

        input::placeholder { color: #94a3b8; }

        button {
            border: none;
            cursor: pointer;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            transition: transform 0.15s, filter 0.15s;
        }

        button:hover { transform: translateY(-1px); filter: brightness(1.08); }

        .primary { background: #2563eb; color: white; width: 100%; }

        .team-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            font-size: 14px;
        }

        .team-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }

        .team-btn { background: #1f2937; color: white; padding: 10px 16px; font-size: 13px; }
        .team-btn.selected { background: #2563eb; }

        .action-btn { width: 100%; margin-top: 8px; color: white; }
        .sold-btn     { background: #d97706; }
        .correct-btn  { background: #16a34a; }
        .wrong-btn    { background: #dc2626; }
        .challenge-btn{ background: #7c3aed; }

        .button-row { display: grid; gap: 8px; margin-bottom: 14px; }

        label { color: #94a3b8; display: block; margin-bottom: 6px; font-size: 13px; }
        hr    { border: none; border-top: 1px solid rgba(148,163,184,0.12); margin: 8px 0; }

        .logs {
            margin-top: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(148,163,184,0.12);
            border-radius: 16px;
            padding: 18px;
            max-height: 220px;
            overflow-y: auto;
        }

        .logs h2 { color: #e2e8f0; margin-bottom: 12px; font-size: 16px; }
        .log { padding: 9px 0; border-bottom: 1px solid rgba(148,163,184,0.1); color: #cbd5e1; font-size: 13px; }
        /* ── MODAL ── */
        #modalOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #0f172a;
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 20px;
            padding: 36px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .modal-box p {
            font-size: 17px;
            color: #e2e8f0;
            line-height: 1.6;
            margin-bottom: 28px;
            white-space: pre-line;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btns button {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: filter 0.15s;
        }

        .modal-btns button:hover { filter: brightness(1.1); }

        #modalOk     { background: #2563eb; color: white; }
        #modalCancel { background: #1e293b; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="header">📊 STAT AUCTION ADMIN</div>

    <!-- Projector Phase Controls -->
    <div class="phase-bar">
        <button class="phase-btn btn-cat" id="phaseBtnCat" onclick="setPhase(1)">
            📺 1 — Category
        </button>
        <button class="phase-btn btn-q" id="phaseBtnQ" onclick="setPhase(2)">
            ❓ 2 — Question
        </button>
        <button class="phase-btn" style="background:#0891b2;" id="phaseBtnAns" onclick="setPhase(3)">
            💡 3 — Answers
        </button>
        <button class="phase-btn btn-lb" id="phaseBtnLb" onclick="setPhase(4)">
            🏆 4 — Leaderboard
        </button>
    </div>

    <!-- Status -->
    <div class="top-status">
        <div class="status-card"><h3>Category</h3><p id="currentCategory">-</p></div>
        <div class="status-card"><h3>Questions Loaded</h3><p id="currentQuestion">-</p></div>
        <div class="status-card"><h3>Selected Team</h3><p id="selectedTeamStatus">-</p></div>
        <div class="status-card"><h3>Current Bid</h3><p id="currentBidStatus">-</p></div>
        <div class="status-card"><h3>Challenge</h3><p id="challengeStatus">Inactive</p></div>
    </div>

    <div class="main-grid">
        <!-- Team Management -->
        <div class="card">
            <h2>Team Management</h2>
            <div class="button-row">
                <button class="action-btn wrong-btn" onclick="exportResults()">📤 Export Results</button>
                <button class="action-btn wrong-btn" onclick="resetAuction()">🗑 Reset Auction</button>
                <button class="action-btn" style="background:#0f766e; font-size:15px;" onclick="endRound()">🏁 End Round → Leaderboard</button>
            </div>

            <input id="teamName" placeholder="Team Name" onkeydown="if(event.key==='Enter') addTeam()">
            <button class="primary" onclick="addTeam()">Add Team</button>

            <select id="category">
                <option>Central Tendency</option>
                <option>Measures of Dispersion</option>
                <option>Probability</option>
                <option>Graphs &amp; Trends</option>
                <option>Tabular Analysis</option>
                <option>Permutations &amp; Combinations</option>
                <option>Simple Maths</option>
                <option>Distribution Analysis</option>
                <option>Mysterious Category</option>
            </select>
            <button class="primary" onclick="updateCategory()">Update Category</button>

            <div id="teamList"></div>
        </div>

        <!-- Bidding Management -->
        <div class="card">
            <h2>Bidding Management</h2>
            <div id="teamButtons" class="team-buttons"></div>

            <input id="bidAmount" type="number" placeholder="Bid Amount">

            <div class="button-row">
                <button class="action-btn sold-btn" onclick="sold()">🔨 SOLD</button>
                <button class="action-btn correct-btn" onclick="correct()">✅ CORRECT</button>
                <button class="action-btn wrong-btn" onclick="wrong()">❌ WRONG</button>
            </div>

            <h3>Challenge</h3>
            <hr>
            <label for="challenger">Select Challenger:</label>
            <select id="challenger"><option value="">Select Challenger</option></select>

            <div class="button-row">
                <button class="action-btn challenge-btn" onclick="challengeCorrect()">🏆 Challenge Correct</button>
                <button class="action-btn wrong-btn" onclick="challengeWrong()">❌ Challenge Wrong</button>
                <button class="action-btn" style="background:#475569;" onclick="noChallenge()">🚫 No Challenge</button>
            </div>
        </div>
    </div>

    <div class="logs">
        <h2>Activity Logs</h2>
        <div id="logs"></div>
    </div>

    <!-- Modal -->
    <div id="modalOverlay">
        <div class="modal-box">
            <p id="modalMessage"></p>
            <div class="modal-btns">
                <button id="modalOk">Confirm</button>
                <button id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
