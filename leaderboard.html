<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAT AUCTION</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#020617 url('Gemini_Generated_Image_u1bozqu1bozqu1bo.png') center/cover no-repeat;
    min-height:100vh;
    color:#e2e8f0;
}

.header{
    background:rgba(15,23,42,0.95);
    color:white;
    text-align:center;
    padding:25px;
    font-size:40px;
    font-weight:700;
    border-radius:18px;
    margin:0 20px 20px;
}

.container{
    width:95%;
    margin:auto;
    padding:0 25px 25px;
}

.top-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:rgba(15,23,42,0.9);
    border-radius:15px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    border:1px solid rgba(148,163,184,0.14);
}

.label{
    color:#94a3b8;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:10px;
}

.category{
    font-size:42px;
    font-weight:700;
    color:#f8fafc;
}

.sold-team{
    font-size:34px;
    font-weight:700;
    color:#f8fafc;
}

.sold-bid{
    font-size:22px;
    color:#94a3b8;
    margin-top:8px;
}

.challenge{
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    background:#1f2937;
    color:#f8fafc;
    font-weight:600;
    text-align:center;
}

.hidden{
    display:none;
}

.leaderboard{
    background:transparent;
    border:none;
    border-radius:0;
    padding:0;
    box-shadow:none;
}

.board-title{
    text-align:center;
    font-size:30px;
    font-weight:700;
    margin-bottom:20px;
    color:#f8fafc;
}

.team-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
    margin-bottom:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(148,163,184,0.14);
}

.rank{
    width:55px;
    height:55px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    color:white;
    font-weight:bold;
    font-size:22px;
}

.gold{
    background:#d4af37;
}

.silver{
    background:#9ca3af;
}

.bronze{
    background:#b87333;
}

.normal{
    background:#334155;
}

.team-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.team-name{
    font-size:28px;
    font-weight:600;
    color:#f8fafc;
}

.coins{
    font-size:32px;
    font-weight:700;
    color:#f8fafc;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:#94a3b8;
}

</style>
</head>
<body>

<div class="header">
📊 STAT AUCTION
</div>

<div class="container">

    <div class="top-grid">

        <div class="card">

            <div class="label">
                Current Category
            </div>

            <div class="category" id="category">
                -
            </div>

        </div>

        <div class="card">

            <div class="label">
                Current Bid
            </div>

            <div class="sold-team" id="soldTeam">
                No Active Bid
            </div>

            <div class="sold-bid" id="soldBid">
                -
            </div>

            <div id="challengeBanner"
                 class="challenge hidden">

                ⚡ CHALLENGE AVAILABLE

            </div>

        </div>

    </div>

    <div class="leaderboard">

        <div class="board-title">
            LEADERBOARD
        </div>

        <div id="leaderboardRows"></div>

    </div>

    <div class="footer">
        Statistics Day Auction Arena
    </div>

</div>

<script>

function renderLeaderboard(){

    let state =
    JSON.parse(
        localStorage.getItem("auction")
    );

    if(!state) return;

    document.getElementById(
        "category"
    ).innerText =
    state.category || "-";

    if(state.currentBid){

        document.getElementById(
            "soldTeam"
        ).innerText =
        state.currentBid.team;

        document.getElementById(
            "soldBid"
        ).innerText =
        state.currentBid.bid + " Coins";

    }
    else{

        document.getElementById(
            "soldTeam"
        ).innerText =
        "No Active Bid";

        document.getElementById(
            "soldBid"
        ).innerText =
        "-";

    }

    let banner =
    document.getElementById(
        "challengeBanner"
    );

    if(state.challenge)
        banner.classList.remove("hidden");
    else
        banner.classList.add("hidden");

    let teams =
    [...state.teams];

    teams.sort(
        (a,b)=>b.coins-a.coins
    );

    let html="";

    teams.forEach((team,index)=>{

        let cls="normal";

        if(index===0) cls="gold";
        if(index===1) cls="silver";
        if(index===2) cls="bronze";

        html += `

        <div class="team-row">

            <div class="team-left">

                <div class="rank ${cls}">
                    ${index===0 ? "🥇" :
                    index===1 ? "🥈" :
                    index===2 ? "🥉" :
                    index+1}
                </div>

                <div class="team-name">
                    ${team.name}
                </div>

            </div>

            <div class="coins">
                ${team.coins}
            </div>

        </div>

        `;
    });

    document.getElementById(
        "leaderboardRows"
    ).innerHTML = html;
}

renderLeaderboard();

setInterval(
    renderLeaderboard,
    500
);

</script>

</body>
</html>
