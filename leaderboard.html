<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAT AUCTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: #020617 url('Gemini_Generated_Image_u1bozqu1bozqu1bo.png') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* ── PHASES ── */
        .phase { display: none; width: 100vw; height: 100vh; }
        .phase.active { display: flex; }

        /* ── PHASE 1: CATEGORY ── */
        #phase1 {
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: rgba(2, 6, 23, 0.55);
        }

        .phase1-label {
            color: #94a3b8;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .phase1-category {
            font-size: 140px;
            font-weight: 900;
            color: #f8fafc;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 4px;
            line-height: 1;
            padding: 0 60px;
            text-shadow: 0 0 60px rgba(37,99,235,0.4);
        }

        /* ── PHASE 2: QUESTION ── */
        #phase2 {
            flex-direction: column;
            padding: 30px 40px;
            background: rgba(2, 6, 23, 0.6);
        }

        .p2-header {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            padding: 16px 30px;
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .p2-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            flex: 1;
            min-height: 0;
        }

        /* flip card - 3 faces */
        .flip-card {
            perspective: 1200px;
            height: 100%;
            min-height: 420px;
        }

        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.9s ease-in-out;
            transform-style: preserve-3d;
        }

        /* State classes on flip-inner */
        .flip-inner.show-questions { transform: rotateY(180deg); }
        .flip-inner.show-answers   { transform: rotateY(360deg); }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 28px 32px;
            border: 1px solid rgba(148,163,184,0.15);
            overflow: hidden;
        }

        .face-front {
            background: rgba(15, 23, 42, 0.95);
            color: white;
            flex-direction: column;
        }

        .face-questions {
            background: white;
            color: #0f172a;
            transform: rotateY(180deg);
            align-items: flex-start;
            text-align: left;
        }

        .face-answers {
            background: rgba(15, 23, 42, 0.97);
            color: white;
            transform: rotateY(360deg);
            align-items: flex-start;
            text-align: left;
        }

        /* keep old .front/.back working for safety */
        .front { background: rgba(15,23,42,0.92); color:white; }
        .back  { background: white; color: #0f172a; transform: rotateY(180deg); }

        .card-label {
            color: #94a3b8;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .front .category-text {
            font-size: 90px;
            font-weight: 900;
            color: #f8fafc;
            text-transform: uppercase;
            line-height: 1;
        }

        .question-text {
            font-size: 32px;
            font-weight: 600;
            line-height: 1.6;
            color: #0f172a;
        }

        /* bid card */
        .bid-card {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(148,163,184,0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .bid-label {
            color: #94a3b8;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .bid-team {
            font-size: 38px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 8px;
        }

        .bid-amount {
            font-size: 26px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .challenge-banner {
            padding: 16px;
            border-radius: 12px;
            background: #7c3aed;
            color: #f8fafc;
            font-weight: 700;
            font-size: 20px;
            text-align: center;
            animation: pulse 1.5s infinite;
            display: none;
        }

        .challenge-banner.visible { display: block; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }

        /* ── PHASE 4: LEADERBOARD ── */
        #phase4 {
            flex-direction: column;
            padding: 30px 60px;
            background: rgba(2, 6, 23, 0.65);
            width: 100%;
        }

        .lb-header {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            padding: 18px 30px;
            font-size: 38px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        .lb-rows { flex: 1; overflow-y: auto; width: 100%; }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 30px;
            margin-bottom: 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(148,163,184,0.14);
            width: 100%;
        }

        .team-left { display: flex; align-items: center; gap: 20px; }

        .rank {
            width: 62px;
            height: 62px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-weight: bold;
            font-size: 26px;
        }

        .gold { background: #d4af37; }
        .silver { background: #9ca3af; }
        .bronze { background: #b87333; }
        .normal { background: #334155; color: white; }

        .team-name { font-size: 32px; font-weight: 600; color: #f8fafc; }
        .coins { font-size: 36px; font-weight: 700; color: #f8fafc; }

        .lb-footer {
            text-align: center;
            margin-top: 16px;
            color: #64748b;
            font-size: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <!-- PHASE 1: Category Only -->
    <div class="phase active" id="phase1">
        <div class="phase1-label">CURRENT CATEGORY</div>
        <div class="phase1-category" id="p1Category">-</div>
    </div>

    <!-- PHASE 2: Flip Card + Bid Info -->
    <div class="phase" id="phase2">
        <div class="p2-header">📊 STAT AUCTION</div>
        <div class="p2-grid">
            <div class="flip-card" id="flipCard">
                <div class="flip-inner" id="flipInner">

                    <!-- FACE 1: Category -->
                    <div class="face face-front">
                        <div class="card-label">CURRENT CATEGORY</div>
                        <div class="category-text" id="p2Category">-</div>
                    </div>

                    <!-- FACE 2: Questions -->
                    <div class="face face-questions">
                        <div style="width:100%; overflow-y:auto; max-height:100%;">
                            <div class="card-label" style="color:#334155; text-align:center; margin-bottom:14px;">QUESTIONS</div>
                            <div style="background:#e8f0fe; border-left:6px solid #2563eb; border-radius:12px; padding:16px 20px; margin-bottom:14px;">
                                <div style="font-size:12px;font-weight:800;color:#2563eb;letter-spacing:2px;margin-bottom:8px;">Q 1</div>
                                <div id="questionText1" style="font-size:22px;font-weight:600;color:#0f172a;line-height:1.5;white-space:pre-line;">-</div>
                                <div id="q1Graph" style="margin-top:12px;"></div>
                            </div>
                            <div style="background:#f3e8ff; border-left:6px solid #7c3aed; border-radius:12px; padding:16px 20px;">
                                <div style="font-size:12px;font-weight:800;color:#7c3aed;letter-spacing:2px;margin-bottom:8px;">Q 2</div>
                                <div id="questionText2" style="font-size:22px;font-weight:600;color:#0f172a;line-height:1.5;white-space:pre-line;">-</div>
                                <div id="q2Graph" style="margin-top:12px;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- FACE 3: Answers -->
                    <div class="face face-answers">
                        <div style="width:100%; overflow-y:auto; max-height:100%;">
                            <div class="card-label" style="color:#f8fafc; text-align:center; margin-bottom:14px;">✅ ANSWERS</div>
                            <div style="background:rgba(74,222,128,0.12); border-left:6px solid #4ade80; border-radius:12px; padding:16px 20px; margin-bottom:14px;">
                                <div style="font-size:12px;font-weight:800;color:#4ade80;letter-spacing:2px;margin-bottom:8px;">A 1</div>
                                <div id="answerText1" style="font-size:22px;font-weight:700;color:#f8fafc;line-height:1.6;white-space:pre-line;">-</div>
                            </div>
                            <div style="background:rgba(251,191,36,0.12); border-left:6px solid #fbbf24; border-radius:12px; padding:16px 20px;">
                                <div style="font-size:12px;font-weight:800;color:#fbbf24;letter-spacing:2px;margin-bottom:8px;">A 2</div>
                                <div id="answerText2" style="font-size:22px;font-weight:700;color:#f8fafc;line-height:1.6;white-space:pre-line;">-</div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="bid-card">
                <div class="bid-label">Current Bid</div>
                <div class="bid-team" id="bidTeam">-</div>
                <div class="bid-amount" id="bidAmount">-</div>
                <div class="challenge-banner" id="challengeBanner">⚡ CHALLENGE AVAILABLE</div>

                <!-- Timer -->
                <div id="timerBlock" style="margin-top:24px; text-align:center; display:none;">
                    <div style="color:#94a3b8; font-size:14px; font-weight:600; letter-spacing:3px; text-transform:uppercase; margin-bottom:8px;">TIME REMAINING</div>
                    <div id="timerDisplay" style="font-size:72px; font-weight:900; color:#f8fafc; letter-spacing:2px; line-height:1;">2:00</div>
                    <svg viewBox="0 0 120 8" style="width:100%; margin-top:10px;">
                        <rect x="0" y="0" width="120" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
                        <rect id="timerBar" x="0" y="0" width="120" height="8" rx="4" fill="#2563eb"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- PHASE 3: Answers (handled by flip card in phase 2 area) -->

    <!-- PHASE 4: Leaderboard -->
    <div class="phase" id="phase4">
        <div class="lb-header">🏆 LEADERBOARD</div>
        <div class="lb-rows" id="lbRows"></div>
        <div class="lb-footer">Statistics Day Auction Arena</div>
    </div>

    <script>
        let lastPhase = null;
        let lastCategory = null;

        // ── GRAPH DEFINITIONS ──
        // keyed by category, returns [svgForQ1, svgForQ2] or null if no graph
        function buildTable(headers, rows, accentColor) {
            const thStyle = `style="background:${accentColor}; color:white; padding:10px 18px; font-size:15px; font-weight:700; text-align:center; letter-spacing:1px;"`;
            const tdStyle = (i) => `style="padding:10px 18px; font-size:16px; font-weight:600; text-align:center; color:#1e293b; background:${i % 2 === 0 ? '#f8fafc' : '#f1f5f9'};"`;
            const ths = headers.map(h => `<th ${thStyle}>${h}</th>`).join('');
            const trs = rows.map((row, i) =>
                `<tr>${row.map(cell => `<td ${tdStyle(i)}>${cell}</td>`).join('')}</tr>`
            ).join('');
            return `
                <table style="width:100%; border-collapse:collapse; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-top:4px;">
                    <thead><tr>${ths}</tr></thead>
                    <tbody>${trs}</tbody>
                </table>`;
        }

        const graphs = {
            'Graphs & Trends': [
                buildBarChart(
                    ['Jan','Feb','Mar','Apr','May'],
                    [120,150,180,210,240],
                    'Monthly Sales (units)',
                    '#2563eb'
                ),
                buildLineChart(
                    ['Jan','Feb','Mar','Apr','May'],
                    [80,120,150,200,250],
                    'Monthly Production (units)',
                    '#7c3aed'
                )
            ],
            'Tabular Analysis': [
                buildTable(
                    ['Student', 'Marks'],
                    [['A','45'],['B','62'],['C','58'],['D','71'],['E','64']],
                    '#2563eb'
                ),
                buildTable(
                    ['Category', 'Amount (₹)'],
                    [['Rent','8,000'],['Food','5,000'],['Travel','2,500'],['Bills','3,000'],['Savings','4,500']],
                    '#7c3aed'
                )
            ]
        };

        function buildBarChart(labels, values, title, color) {
            const W=520, H=200;
            const pt=30, pr=20, pb=40, pl=50;
            const maxV = Math.max(...values);
            const cw = (W - pl - pr) / labels.length;
            const bw = cw * 0.55;
            let bars = '';
            labels.forEach((lbl, i) => {
                const bh = ((values[i] / maxV) * (H - pt - pb));
                const x = pl + i * cw + (cw - bw) / 2;
                const y = H - pb - bh;
                bars += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="4"/>`;
                bars += `<text x="${x + bw/2}" y="${y - 5}" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="700">${values[i]}</text>`;
                bars += `<text x="${x + bw/2}" y="${H - pb + 14}" text-anchor="middle" font-size="11" fill="#475569">${lbl}</text>`;
            });
            const axis = `<line x1="${pl}" y1="${pt}" x2="${pl}" y2="${H-pb}" stroke="#cbd5e1" stroke-width="1.5"/>
                          <line x1="${pl}" y1="${H-pb}" x2="${W-pr}" y2="${H-pb}" stroke="#cbd5e1" stroke-width="1.5"/>`;
            const titleEl = `<text x="${W/2}" y="18" text-anchor="middle" font-size="12" fill="#334155" font-weight="700">${title}</text>`;
            return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:200px;">${titleEl}${axis}${bars}</svg>`;
        }

        function buildLineChart(labels, values, title, color) {
            const W=520, H=200, pad={t:30,r:20,b:40,l:50};
            const maxV = Math.max(...values);
            const minV = Math.min(...values);
            const range = maxV - minV || 1;
            const cw = (W - pad.l - pad.r) / (labels.length - 1);
            const points = values.map((v, i) => {
                const x = pad.l + i * cw;
                const y = H - pad.b - ((v - minV) / range) * (H - pad.t - pad.b);
                return {x, y, v, lbl: labels[i]};
            });
            const polyline = points.map(p => `${p.x},${p.y}`).join(' ');
            let dots = '';
            points.forEach(p => {
                dots += `<circle cx="${p.x}" cy="${p.y}" r="5" fill="${color}" stroke="white" stroke-width="2"/>`;
                dots += `<text x="${p.x}" y="${p.y - 10}" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="700">${p.v}</text>`;
                dots += `<text x="${p.x}" y="${H - pad.b + 14}" text-anchor="middle" font-size="11" fill="#475569">${p.lbl}</text>`;
            });
            const axis = `<line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${H-pad.b}" stroke="#cbd5e1" stroke-width="1.5"/>
                          <line x1="${pad.l}" y1="${H-pad.b}" x2="${W-pad.r}" y2="${H-pad.b}" stroke="#cbd5e1" stroke-width="1.5"/>`;
            const titleEl = `<text x="${W/2}" y="18" text-anchor="middle" font-size="12" fill="#334155" font-weight="700">${title}</text>`;
            const line = `<polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="3" stroke-linejoin="round"/>`;
            return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:200px;">${titleEl}${axis}${line}${dots}</svg>`;
        }

        function setPhase(n) {
            document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
            // phases 1,2,3 all use the p2 layout (flip card area); phase 4 is leaderboard
            if (n === 1) document.getElementById('phase1').classList.add('active');
            else if (n === 4) document.getElementById('phase4').classList.add('active');
            else document.getElementById('phase2').classList.add('active');
        }

        function render() {
            const state = JSON.parse(localStorage.getItem('auction')) || {};
            const phase = state.projectorPhase || 1;

            const cat = state.category || '-';
            document.getElementById('p1Category').innerText = cat;
            document.getElementById('p2Category').innerText = cat;
            const qs = state.questions || [];
            const as = state.answers || [];
            document.getElementById('questionText1').innerText = qs[0] || '-';
            document.getElementById('questionText2').innerText = qs[1] || '-';
            document.getElementById('answerText1').innerText = as[0] || '-';
            document.getElementById('answerText2').innerText = as[1] || '-';

            // Inject graphs/tables when category changes
            if (cat !== lastCategory) {
                lastCategory = cat;
                const g = graphs[cat] || [null, null];
                document.getElementById('q1Graph').innerHTML = g[0] || '';
                document.getElementById('q2Graph').innerHTML = g[1] || '';
            }

            // 3-state flip: category → questions → answers
            const flipInner = document.getElementById('flipInner');
            flipInner.classList.remove('show-questions', 'show-answers');
            if (state.showAnswers) {
                flipInner.classList.add('show-answers');
            } else if (state.flip) {
                flipInner.classList.add('show-questions');
            }

            // Bid info
            if (state.currentBid) {
                document.getElementById('bidTeam').innerText = state.currentBid.team;
                document.getElementById('bidAmount').innerText = state.currentBid.bid + ' Coins';
            } else {
                document.getElementById('bidTeam').innerText = '-';
                document.getElementById('bidAmount').innerText = '-';
            }

            // Challenge
            const banner = document.getElementById('challengeBanner');
            if (state.challenge) {
                banner.classList.add('visible');
            } else {
                banner.classList.remove('visible');
            }

            // Timer
            const DURATION = 120; // 2 minutes in seconds
            const timerBlock = document.getElementById('timerBlock');
            const timerDisplay = document.getElementById('timerDisplay');
            const timerBar = document.getElementById('timerBar');

            if (state.timerStart && phase === 2) {
                const elapsed = (Date.now() - state.timerStart) / 1000;
                const remaining = Math.max(0, DURATION - elapsed);
                const mins = Math.floor(remaining / 60);
                const secs = Math.floor(remaining % 60);
                const pct = (remaining / DURATION) * 120;

                timerBlock.style.display = 'block';
                timerDisplay.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
                timerBar.setAttribute('width', pct.toFixed(1));

                // Color shift: green → yellow → red
                if (remaining > 60) {
                    timerDisplay.style.color = '#4ade80';
                    timerBar.setAttribute('fill', '#16a34a');
                } else if (remaining > 30) {
                    timerDisplay.style.color = '#fbbf24';
                    timerBar.setAttribute('fill', '#d97706');
                } else {
                    timerDisplay.style.color = '#f87171';
                    timerBar.setAttribute('fill', '#dc2626');
                }
            } else {
                timerBlock.style.display = 'none';
            }

            // Leaderboard rows
            if (phase === 4 && state.teams && state.teams.length > 0) {
                let teams = [...state.teams].sort((a, b) => {
                if (b.coins !== a.coins) return b.coins - a.coins;
                // Tiebreaker: lower average solve time wins
                const avgA = a.solveCount ? a.totalSolveMs / a.solveCount : Infinity;
                const avgB = b.solveCount ? b.totalSolveMs / b.solveCount : Infinity;
                return avgA - avgB;
            });
                let html = '';
                teams.forEach((team, i) => {
                    let cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
                    let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
                    html += `
                        <div class="team-row">
                            <div class="team-left">
                                <div class="rank ${cls}">${medal}</div>
                                <div>
                                    <div class="team-name">${team.name}</div>
                                    ${team.solveCount ? `<div style="font-size:13px; color:#64748b; margin-top:2px;">⏱ avg ${Math.round((team.totalSolveMs/team.solveCount)/1000)}s over ${team.solveCount} answer${team.solveCount > 1 ? 's' : ''}</div>` : ''}
                                </div>
                            </div>
                            <div class="coins">${team.coins}</div>
                        </div>`;
                });
                document.getElementById('lbRows').innerHTML = html;
            }

            // Switch phase only when it changes
            if (phase !== lastPhase) {
                setPhase(phase);
                lastPhase = phase;
            }
        }

        render();
        setInterval(render, 400);
    </script>
</body>
</html>
